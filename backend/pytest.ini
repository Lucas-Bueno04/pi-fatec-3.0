[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests
    integration: Integration tests
    bdd: BDD scenario tests
addopts = --cov=app --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=95
